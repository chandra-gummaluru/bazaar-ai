<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazaar - Host</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Spectral:wght@400;500;600;700&display=swap');

        :root {
            --panel-border: #8b4513;
            --brass: #d4af37;
            --ease-swift: cubic-bezier(0.22, 1, 0.36, 1);
            --shadow-panel: inset 0 1px 0 rgba(255, 235, 198, 0.45), 0 10px 24px rgba(21, 10, 7, 0.35);
        }

        html,
        body {
            font-family: 'Spectral', serif;
            margin: 0;
            background:
                radial-gradient(circle at 16% 8%, rgba(241, 178, 112, 0.16), transparent 34%),
                radial-gradient(circle at 84% 6%, rgba(125, 50, 40, 0.22), transparent 38%),
                linear-gradient(180deg, #4f2319 0%, #2f140f 100%);
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        button {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .ancient-title {
            font-family: 'Marcellus', serif;
            text-shadow: 0 2px 0 rgba(253, 236, 201, 0.32), 0 6px 20px rgba(0, 0, 0, 0.35);
            letter-spacing: 0.04em;
        }

        .parchment-bg {
            background:
                linear-gradient(165deg, rgba(255, 236, 202, 0.97), rgba(244, 212, 167, 0.94)),
                repeating-linear-gradient(45deg, rgba(173, 94, 58, 0.04) 0 12px, rgba(255, 255, 255, 0.04) 12px 24px);
            box-shadow: var(--shadow-panel);
        }

        .merchant-border {
            border: 3px solid var(--panel-border);
            box-shadow: inset 0 0 0 1px rgba(255, 228, 184, 0.3);
        }

        .coin-icon {
            color: var(--brass);
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.35));
            -webkit-text-stroke: 1px #533121;
            text-shadow: 1px 1px 0 #533121;
        }

        .action-btn {
            font-family: 'Marcellus', serif;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            background: linear-gradient(180deg, #ffe7c3, #efc98f);
            border: 2px solid #7a3728;
            color: #4a2518;
            box-shadow: 0 8px 18px rgba(84, 34, 21, 0.28);
            transition: transform 0.2s var(--ease-swift), box-shadow 0.2s var(--ease-swift), filter 0.2s;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: saturate(1.12);
            box-shadow: 0 12px 22px rgba(84, 34, 21, 0.38);
        }

        .action-btn:disabled {
            opacity: 0.42;
            cursor: not-allowed;
        }

        .mode-btn {
            transition: all 0.25s var(--ease-swift);
            min-width: 140px;
        }

        .mode-btn:hover {
            transform: translateY(-3px);
        }

        .mode-btn-selected {
            background: linear-gradient(180deg, #f7d8a2, #d7964e);
            color: #3f2015;
            box-shadow: 0 10px 24px rgba(96, 46, 29, 0.34);
        }

        .mode-btn-selected:hover {
            transform: none;
        }

        /* Hanging mode selection signs */
        .mode-sign-row {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 36px;
            padding-top: 38px;
            padding-bottom: 4px;
            flex-wrap: wrap;
        }

        .mode-sign {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 148px;
            padding: 14px 26px 16px;
            border-radius: 12px;
            border: 2px solid rgba(102, 46, 32, 0.72);
            background:
                linear-gradient(180deg, rgba(255, 242, 218, 0.96), rgba(224, 169, 95, 0.9)),
                repeating-linear-gradient(90deg, rgba(255, 226, 178, 0.12) 0 10px, rgba(126, 58, 42, 0.08) 10px 20px);
            font-family: 'Marcellus', serif;
            font-size: 0.86rem;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: #5a2a1c;
            box-shadow: 0 10px 18px rgba(37, 14, 9, 0.28), inset 0 1px 0 rgba(255, 246, 227, 0.6);
            cursor: pointer;
            transform-origin: 50% -28px;
            animation: signHangSway 5s ease-in-out infinite;
            transition: border-color 0.2s, box-shadow 0.2s;
            user-select: none;
            line-height: 1;
        }

        .mode-sign::before,
        .mode-sign::after {
            content: '';
            position: absolute;
            top: -30px;
            width: 2px;
            height: 30px;
            background: linear-gradient(180deg, rgba(248, 223, 180, 0.95), rgba(120, 56, 41, 0.38));
            box-shadow: 0 0 0 1px rgba(78, 36, 25, 0.16);
        }

        .mode-sign::before { left: 22px; }
        .mode-sign::after  { right: 22px; }

        .mode-sign:hover {
            box-shadow: 0 14px 24px rgba(37, 14, 9, 0.38), inset 0 1px 0 rgba(255, 246, 227, 0.6);
            border-color: rgba(139, 69, 19, 0.9);
        }

        .mode-sign-selected {
            background:
                linear-gradient(180deg, rgba(255, 231, 165, 0.98), rgba(215, 148, 52, 0.94)),
                repeating-linear-gradient(90deg, rgba(255, 226, 168, 0.16) 0 10px, rgba(126, 58, 42, 0.1) 10px 20px);
            border-color: rgba(139, 69, 19, 0.9);
            color: #3e1e0d;
            box-shadow: 0 12px 24px rgba(96, 46, 29, 0.42), inset 0 1px 0 rgba(255, 246, 227, 0.7), 0 0 0 2px rgba(212, 175, 55, 0.38);
            animation: none;
            transform: rotate(0deg);
        }

        .mode-sign-icon {
            font-size: 1.3rem;
            margin-bottom: 2px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
        }

        @keyframes signHangSway {
            0%   { transform: rotate(0.9deg); }
            50%  { transform: rotate(-0.9deg); }
            100% { transform: rotate(0.9deg); }
        }

        /* QR wooden sign – hangs in bottom-right of the shell */
        .qr-sign-wrap {
            position: absolute;
            right: 52px;
            bottom: 88px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-sign-wrap.qr-sign-hidden {
            display: none;
        }

        .qr-sign-wrap.qr-sign-center {
            left: 50% !important;
            right: auto !important;
            bottom: unset !important;
            top: 0 !important;
            transform: translateX(-50%);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
        }

        .qr-sign-wrap.qr-sign-center.qr-sign-enter {
            opacity: 0;
            transform: translate(-50%, -170px);
        }

        .qr-sign-wrap.qr-sign-center.qr-sign-exit-up {
            opacity: 0;
            transform: translate(-50%, -200px);
            pointer-events: none;
        }

        .qr-sign-wrap.qr-sign-center .qr-sign-ropes {
            width: 140px;
            height: 212px;
            position: relative;
            z-index: 0;
        }

        .qr-sign-wrap.qr-sign-center .qr-sign-ropes::before,
        .qr-sign-wrap.qr-sign-center .qr-sign-ropes::after {
            height: 212px;
        }

        .qr-sign-wrap.qr-sign-center .qr-sign {
            position: relative;
            z-index: 3;
        }

        .qr-sign-ropes {
            display: flex;
            justify-content: space-between;
            width: 128px;
            height: 30px;
        }

        .qr-sign-ropes::before,
        .qr-sign-ropes::after {
            content: '';
            width: 2px;
            height: 30px;
            background: linear-gradient(180deg, rgba(248, 223, 180, 0.95), rgba(120, 56, 41, 0.38));
            box-shadow: 0 0 0 1px rgba(78, 36, 25, 0.16);
        }

        .qr-sign {
            padding: 12px 14px 14px;
            border-radius: 10px;
            border: 2px solid rgba(80, 36, 18, 0.85);
            background:
                linear-gradient(175deg, rgba(185, 115, 52, 0.98), rgba(130, 72, 28, 0.97)),
                repeating-linear-gradient(90deg, rgba(255, 210, 140, 0.09) 0 8px, rgba(90, 38, 14, 0.13) 8px 16px),
                repeating-linear-gradient(0deg,  rgba(255, 210, 140, 0.05) 0 5px, rgba(90, 38, 14, 0.07) 5px 10px);
            box-shadow:
                0 14px 28px rgba(16, 6, 2, 0.45),
                inset 0 1px 0 rgba(255, 232, 180, 0.22),
                inset 0 -1px 0 rgba(0, 0, 0, 0.22),
                inset 2px 0 0 rgba(255, 220, 160, 0.1),
                inset -2px 0 0 rgba(0, 0, 0, 0.12);
            text-align: center;
            transform-origin: 50% -30px;
            animation: signHangSway 6.4s ease-in-out infinite;
            animation-delay: -2.3s;
            min-width: 230px;
        }

        .qr-sign-label {
            font-family: 'Marcellus', serif;
            font-size: 0.68rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255, 234, 190, 0.9);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            margin-bottom: 8px;
        }

        .qr-sign-code {
            position: relative;
            background:
                linear-gradient(165deg, rgba(245, 224, 186, 0.98), rgba(215, 170, 108, 0.96)),
                repeating-linear-gradient(90deg, rgba(255, 236, 200, 0.12) 0 8px, rgba(118, 62, 34, 0.07) 8px 16px);
            border: 1px solid rgba(86, 39, 22, 0.55);
            border-radius: 8px;
            padding: 8px;
            display: inline-block;
            line-height: 0;
            box-shadow:
                0 3px 8px rgba(0, 0, 0, 0.26),
                inset 0 1px 0 rgba(255, 238, 204, 0.55),
                inset 0 0 0 1px rgba(62, 28, 16, 0.2);
        }

        #qrcode {
            display: block;
            padding: 0;
            background: #f2dfba;
            border: none;
            border-radius: 2px;
            box-shadow: none;
        }

        #qrcode img,
        #qrcode canvas {
            display: block;
            border-radius: 2px;
        }

        .qr-sign-url {
            font-family: monospace;
            font-size: 0.58rem;
            color: rgba(255, 226, 180, 0.75);
            margin-top: 7px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 210px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
            line-height: 1.4;
        }

        .qr-sign-wifi {
            font-family: 'Marcellus', serif;
            font-size: 0.58rem;
            letter-spacing: 0.07em;
            color: rgba(255, 218, 158, 0.65);
            margin-top: 4px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        }

        @media (max-width: 900px) {
            .qr-sign-wrap { right: 10px; bottom: 72px; }
            .qr-sign-wrap.qr-sign-center {
                left: 50% !important;
                right: auto !important;
                bottom: unset !important;
                top: 0 !important;
                transform: translateX(-50%);
            }

            .qr-sign-wrap.qr-sign-center .qr-sign-ropes,
            .qr-sign-wrap.qr-sign-center .qr-sign-ropes::before,
            .qr-sign-wrap.qr-sign-center .qr-sign-ropes::after {
                height: 172px;
            }

            .setup-player-row .player-header-rail {
                width: 45vw;
                flex-basis: 45vw;
            }

            .setup-player-row .player-nameplate {
                width: 34vw;
                min-width: 34vw;
                max-width: 34vw;
            }
        }

        .status-pill {
            font-family: 'Marcellus', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(140deg, #6f2d1f, #51221a);
            border: 2px solid var(--brass);
            color: #ffeecf;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
        }

        .player-pill {
            font-family: 'Marcellus', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #7d3a2a;
            color: #4f281b;
            background: linear-gradient(180deg, #ffe7c3, #efca92);
        }

        /* Setup screen: player-selector column nameplates */
        .setup-player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 36px 0 28px;
            min-height: 64px;
            position: relative;
        }

        .setup-player-row .player-header-rail {
            margin-bottom: 0;
            flex: 0 0 auto;
            width: 308px;
            flex-basis: 308px;
        }

        .setup-player-row .player-nameplate {
            min-height: 52px;
            height: 52px;
            padding-top: 0;
            padding-bottom: 0;
            width: 228px;
            min-width: 228px;
            max-width: 228px;
        }

        .setup-player-row .setup-select {
            min-width: 0;
            max-width: none;
        }

        .setup-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 0 24px;
        }

        .setup-vs {
            font-family: 'Marcellus', serif;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #4a2518;
            text-shadow: 0 1px 0 rgba(255, 236, 200, 0.5);
        }

        .floor-action-plaque #setup-start-btn {
            margin-top: 4px;
            pointer-events: auto;
        }

        .floor-action-plaque #main-action-controls {
            pointer-events: auto;
            margin-top: 2px;
        }

        .setup-select {
            font-family: 'Marcellus', serif;
            font-size: 0.92rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            background: transparent;
            border: none;
            color: #4e2519;
            cursor: pointer;
            outline: none;
            width: 100%;
            min-width: 132px;
            max-width: 190px;
            height: 100%;
            line-height: 1.1;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            text-align: center;
            padding: 0 20px 0 10px;
            background-image: linear-gradient(180deg, rgba(255, 241, 214, 0.12), rgba(230, 183, 124, 0.08));
            border-radius: 8px;
        }

        .setup-select::-ms-expand {
            display: none;
        }

        .setup-select option {
            background: #f5e0c0;
            color: #4e2519;
            font-family: sans-serif;
            text-transform: none;
            font-size: 0.88rem;
            letter-spacing: 0;
        }

        .setup-select:disabled {
            opacity: 0.52;
            cursor: default;
        }

        .setup-caret {
            font-size: 0.65rem;
            color: #7a3728;
            opacity: 0.7;
            pointer-events: none;
            flex-shrink: 0;
        }

        .scroll-bg {
            background: linear-gradient(160deg, #f8e8ca, #efcca0);
            border: 2px solid #84402d;
            box-shadow: var(--shadow-panel);
        }

        .game-shell {
            position: relative;
            padding: 1.2rem;
            border-radius: 0;
            border: none;
            background:
                radial-gradient(circle at 8% 10%, rgba(248, 206, 141, 0.18), transparent 26%),
                radial-gradient(circle at 92% 12%, rgba(140, 60, 42, 0.2), transparent 30%),
                linear-gradient(165deg, rgba(45, 19, 14, 0.72), rgba(35, 13, 10, 0.58));
            box-shadow: none;
            backdrop-filter: none;
            overflow: visible;
            isolation: isolate;
        }

        /* Full-viewport shell used by connecting / loading overlays */
        .screen-shell-fit {
            width: 100%;
            max-width: 100%;
            min-height: 100dvh;
            margin-left: auto;
            margin-right: auto;
            box-sizing: border-box;
        }

        .game-shell.market-view-shell .player-bag-wrap.player-bag-left {
            bottom: -146px;
        }

        .game-shell.market-view-shell .player-bag-wrap.player-bag-right {
            bottom: -146px;
        }

        .game-shell.market-view-shell .player-hero-stage {
            align-items: flex-end;
        }

        .game-shell.market-view-shell .player-bag-column {
            align-self: flex-end;
        }

        .game-shell.market-view-shell .player-hero-left .player-hand-rail,
        .game-shell.market-view-shell .player-hero-right .player-hand-rail {
            top: -4px;
        }

        .game-shell.market-view-shell .player-hero-left .player-hand-rail {
            transform: translateX(-178px) translateY(-100px);
        }

        .game-shell.market-view-shell .player-hero-right .player-hand-rail {
            transform: translateX(178px) translateY(-100px);
        }

        .game-shell.market-view-shell .stack-board {
            margin-top: 0;
            transform: translateY(-64px);
        }

        .game-shell.market-view-shell .bazaar-front-floor {
            bottom: -4px;
            height: 20px;
        }

        .game-shell.market-view-shell {
            height: 100dvh;
            min-height: 100dvh;
            overflow: hidden;
        }

        #connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Keep the loading-screen sign visible while preserving other screens' sign placement */
        #connection-status .market-sign {
            top: 10px;
        }

        .game-shell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: none;
            pointer-events: none;
            z-index: 0;
        }

        .game-shell > * {
            position: relative;
            z-index: 1;
        }

        /* Keep QR/hanging sign anchored to shell coordinates instead of content flow */
        #qr-code-section {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
        }

        #qr-code-section .qr-sign-wrap {
            pointer-events: none;
        }

        .setup-header-layer {
            position: relative;
            z-index: 4;
        }

        .market-sign,
        .mode-sign-row,
        #mode-signs-area {
            position: relative;
            z-index: 8;
        }

        .game-panel {
            position: relative;
            border-radius: 30px;
            padding: 1rem;
            border: 1px solid rgba(255, 226, 178, 0.09);
            background:
                radial-gradient(circle at 12% 10%, rgba(255, 243, 220, 0.58), rgba(255, 236, 202, 0) 44%),
                radial-gradient(circle at 86% 78%, rgba(173, 87, 56, 0.18), rgba(173, 87, 56, 0) 42%),
                linear-gradient(166deg, rgba(245, 217, 175, 0.82), rgba(224, 177, 124, 0.66));
            box-shadow: 0 12px 30px rgba(19, 8, 6, 0.26), inset 0 1px 0 rgba(255, 241, 215, 0.34);
        }

        .game-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .game-panel > * {
            position: relative;
            z-index: 1;
        }

        .ornate-divider {
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 155, 0.2), rgba(140, 61, 45, 0.8), rgba(255, 215, 155, 0.2), transparent);
            box-shadow: 0 0 18px rgba(236, 186, 116, 0.24);
        }

        .goods-card {
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .goods-card.slot-placeholder {
            border-style: dashed !important;
            background: transparent !important;
        }

        .goods-card.slot-placeholder > * {
            visibility: visible;
        }

        .goods-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0) 46%, rgba(0, 0, 0, 0.2));
            mix-blend-mode: soft-light;
            pointer-events: none;
            z-index: 0;
        }

        .resource-svg {
            fill: none;
            stroke: currentColor;
            width: 34px;
            height: 34px;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.4));
            z-index: 2;
        }

        .resource-svg.svg-sm {
            width: 24px;
            height: 24px;
        }

        .resource-svg.svg-lg {
            width: 34px;
            height: 34px;
        }

        .ui-badge-svg {
            fill: none;
            stroke: currentColor;
            vertical-align: middle;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
        }

        .ui-badge-sm {
            width: 14px;
            height: 14px;
        }

        .ui-badge-md {
            width: 18px;
            height: 18px;
        }

        .coin-stack {
            position: relative;
            width: 78px;
            height: 78px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
        }

        .coin-stack-layer,
        .coin-stack-top {
            position: absolute;
            width: 52px;
            height: 52px;
            border-radius: 999px;
            border: 2px solid currentColor;
        }

        .coin-stack-layer.l3 { transform: translateY(12px); opacity: 0.34; }
        .coin-stack-layer.l2 { transform: translateY(8px); opacity: 0.46; }
        .coin-stack-layer.l1 { transform: translateY(4px); opacity: 0.62; }

        .coin-stack-top {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff8ec;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.35);
        }

        .coin-stack-count {
            position: absolute;
            bottom: -4px;
            right: -5px;
            min-width: 24px;
            height: 24px;
            padding: 0 6px;
            border-radius: 999px;
            background: rgba(39, 20, 14, 0.9);
            border: 1px solid rgba(248, 211, 162, 0.5);
            color: #ffe8c8;
            font-size: 12px;
            line-height: 22px;
            font-weight: 700;
            text-align: center;
        }

        .coin-fly {
            position: fixed;
            z-index: 1300;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            pointer-events: none;
            color: #fff8ec;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.35);
        }

        .stack-board {
            position: relative;

        @keyframes torchFlicker {
            0% { transform: translateY(0) scale(1); opacity: 0.95; }
            30% { transform: translateY(-1px) scale(1.06, 0.98) rotate(-2deg); opacity: 1; }
            55% { transform: translateY(0) scale(0.95, 1.06) rotate(1deg); opacity: 0.9; }
            80% { transform: translateY(-1px) scale(1.04, 0.96) rotate(-1deg); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 0.95; }

            0%   { opacity: 0; transform: scale(0.1); filter: blur(4px); }
            40%  { opacity: 1; transform: scale(1.6); filter: blur(0.5px); }
            70%  { transform: scale(0.88); filter: blur(0); }

function fadeOutMarketAmbience(durationMs = 2000) {
    marketAmbienceFadeToken += 1;
    const token = marketAmbienceFadeToken;
    wantsMarketAmbience = false;

    const audio = marketAmbienceAudio;
    if (!audio || audio.paused) {
        if (audio) {
            audio.currentTime = 0;
            audio.volume = MARKET_AMBIENCE_VOLUME;
        }
        marketAmbienceFading = false;
        return;
    }

    marketAmbienceFading = true;
    const startVolume = Math.max(0, Math.min(1, audio.volume));
    const fadeStart = performance.now();

    const step = (now) => {
        if (token !== marketAmbienceFadeToken) {
            marketAmbienceFading = false;
            return;
        }
        const elapsed = now - fadeStart;
        const t = Math.max(0, Math.min(1, elapsed / Math.max(1, durationMs)));
        audio.volume = startVolume * (1 - t);

        if (t < 1 && !audio.paused) {
            requestAnimationFrame(step);
            return;
        }

        if (!audio.paused) audio.pause();
        audio.currentTime = 0;
        audio.volume = MARKET_AMBIENCE_VOLUME;
        marketAmbienceFading = false;
    };

    requestAnimationFrame(step);
}

function createGameplayBgmAudio() {

    const audio = new Audio(pick);
    audio.loop = true;
    audio.volume = GAMEPLAY_BGM_VOLUME;
    audio.preload = 'auto';
    return audio;
}

function ensureGameplayBgm(forceNew = false) {
    if (forceNew || !gameplayBgmAudio) gameplayBgmAudio = createGameplayBgmAudio();
    return gameplayBgmAudio;
}

function stopGameplayBgm(resetTrack = false) {
    gameplayBgmDelayToken += 1;
    gameplayBgmDelayActive = false;
    gameplayBgmFadeToken += 1;
    gameplayBgmFading = false;

    if (gameplayBgmAudio && !gameplayBgmAudio.paused) {
        gameplayBgmAudio.pause();
    }
    if (gameplayBgmAudio) {
        gameplayBgmAudio.currentTime = 0;
        gameplayBgmAudio.volume = GAMEPLAY_BGM_VOLUME;
    }
    if (resetTrack) gameplayBgmAudio = null;
}

function fadeOutGameplayBgm(durationMs = 1000, resetTrack = true) {
    gameplayBgmDelayToken += 1;
    gameplayBgmDelayActive = false;
    gameplayBgmFadeToken += 1;
    const token = gameplayBgmFadeToken;

    const audio = gameplayBgmAudio;
    if (!audio || audio.paused) {
        if (audio) {
            audio.currentTime = 0;
            audio.volume = GAMEPLAY_BGM_VOLUME;
        }
        gameplayBgmFading = false;
        if (resetTrack) gameplayBgmAudio = null;
        return Promise.resolve();
    }

    gameplayBgmFading = true;
    const startVolume = Math.max(0, Math.min(1, audio.volume));
    const fadeStart = performance.now();

    return new Promise((resolve) => {
        const step = (now) => {
            if (token !== gameplayBgmFadeToken) {
                gameplayBgmFading = false;
                resolve();
                return;
            }

            const elapsed = now - fadeStart;
            const t = Math.max(0, Math.min(1, elapsed / Math.max(1, durationMs)));
            audio.volume = startVolume * (1 - t);

            if (t < 1 && !audio.paused) {
                requestAnimationFrame(step);
                return;
            }

            if (!audio.paused) audio.pause();
            audio.currentTime = 0;
            audio.volume = GAMEPLAY_BGM_VOLUME;
            gameplayBgmFading = false;
            if (resetTrack) gameplayBgmAudio = null;
            resolve();
        };

        requestAnimationFrame(step);
    });
}

function playGameplayBgmRandom() {
    const current = gameplayBgmAudio;
    if (current && !current.paused) current.pause();
    gameplayBgmAudio = ensureGameplayBgm(true);
    gameplayBgmAudio.currentTime = 0;
    gameplayBgmAudio.volume = GAMEPLAY_BGM_VOLUME;

    const playPromise = gameplayBgmAudio.play();
    if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {
            // Autoplay can still fail in some browsers until a gesture.
        });
    }
}

function scheduleGameplayBgmStart(delayMs = 1000) {
    gameplayBgmDelayToken += 1;
    const token = gameplayBgmDelayToken;
    gameplayBgmDelayActive = true;

    (async () => {
        await sleep(delayMs);
        if (token !== gameplayBgmDelayToken) return;
        gameplayBgmDelayActive = false;
        if (!wantsGameplayBgm) return;
        playGameplayBgmRandom();
    })();
}

function playRevealScoreMusicSequence() {
    scoreMusicSequenceToken += 1;
    const token = scoreMusicSequenceToken;
    scoreMusicRequested = true;

    stopGameplayBgm(true);
    if (scoresBgmAudio && !scoresBgmAudio.paused) scoresBgmAudio.pause();

    const cue = ensureStartCue();
    cue.currentTime = 0;
    cue.onended = null;

    const playPromise = cue.play();
    if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {
            // If start cue cannot play, don't force score loop.
        });
    }

    setTimeout(() => {
        if (token !== scoreMusicSequenceToken || !scoreMusicRequested) return;
        startScoresBgmLoop();
    }, 1300);
}

async function loadAvailableAgents() {
    try {
        const response = await fetch('/api/agents');
        if (response.ok) {
            const data = await response.json();
            availableAgents = data.agents || [];
            botPlayers = availableAgents.map(a => ({ id: a.id, name: a.name }));
            console.log('Loaded agents:', botPlayers);
        }
    } catch (error) {
        console.error('Failed to load agents:', error);
        botPlayers = [];
    }
}

function connectWebSocket() {
    console.log('Starting REST API polling...');
    
    // Load available agents first
    loadAvailableAgents();
    
    // Hide the connection screen immediately
    const connectionStatus = document.getElementById('connection-status');
    if (connectionStatus) {
        connectionStatus.style.display = 'none';
    }
    
    // Poll for game state every 500ms
    let lastStateString = '';
    let lastRound = 0;
    setInterval(async () => {
        try {
            const response = await fetch('/api/state');
            if (response.ok) {
                const newState = await response.json();
                const newStateString = JSON.stringify(newState);
                
                // Only re-render if state actually changed
                if (newStateString !== lastStateString) {
                    // Play move sound when round advances
                    if (newState.round && newState.round > lastRound && lastRound > 0) {
                        SFX.move();
                    }
                    if (newState.round) lastRound = newState.round;
                    
                    prevHostState = gameState;
                    hostCardSnapshot = captureHostCardSnapshot();
                    prevHostHandDisplayOrders = hostHandDisplayOrders.map((slots) => [...(slots || [])]);
                    prevHostMarketDisplaySlots = [...hostMarketDisplaySlots];
                    gameState = newState;
                    lastStateString = newStateString;
                    
                    // Update connected players list
                    updateConnectedPlayersList(newState);
                    
                    renderGame();
                    applyHostDeltaAnimations(prevHostState, gameState);
                }
            }
        } catch (error) {
            console.error('Poll error:', error);
        }
    }, 500);
    
    // Initial render
    renderGame();
}

function updateConnectedPlayersList(state) {
    // Track connected human players
    const newPlayers = [];
    
    if (state.player1Connected) {
        // Check if this player is already in our list
        if (!connectedPlayers.find(p => p.id === 'player1')) {
            newPlayers.push({ id: 'player1', name: 'Player 1' });
        }
    }
    
    if (state.player2Connected) {
        // Check if this player is already in our list
        if (!connectedPlayers.find(p => p.id === 'player2')) {
            newPlayers.push({ id: 'player2', name: 'Player 2' });
        }
    }
    
    // Add new players to list
    connectedPlayers.push(...newPlayers);
    
    // Remove disconnected players
    connectedPlayers = connectedPlayers.filter(p => {
        if (p.id === 'player1') return state.player1Connected;
        if (p.id === 'player2') return state.player2Connected;
        return true;
    });
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function getBulbPairs(bulbs, fromInnerToOuter = false) {
    const arr = Array.from(bulbs);
    const n = arr.length;
    const half = Math.floor(n / 2);
    const pairs = [];

    for (let i = 0; i < half; i++) {
        pairs.push([arr[i], arr[n - 1 - i]]);
    }
    if (n % 2 === 1) {
        pairs.push([arr[half]]);
    }

    return fromInnerToOuter ? pairs.reverse() : pairs;
}

function expandBulbPairsToSteps(pairs) {
    const steps = [];
    pairs.forEach((pair) => {
        if (pair.length <= 1) {
            steps.push(pair);
            return;
        }
        // Split each mirrored pair into two micro-steps for smoother staged dimming.
        steps.push([pair[0]]);
        steps.push([pair[1]]);
    });
    return steps;
}

function ensureBlackoutOverlay(shell) {
    let overlay = document.body.querySelector('.light-seq-blackout');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'light-seq-blackout';
        document.body.appendChild(overlay);
    }

    // Smooth filter/overlay interpolation between strand steps.
    shell.style.willChange = 'filter';
    shell.style.transition = 'filter 70ms steps(1, end)';
    overlay.style.willChange = 'opacity';
    overlay.style.transition = 'opacity 70ms steps(1, end)';

    const lanternRow = shell.parentElement && shell.parentElement.querySelector('.bazaar-lantern-row');
    if (lanternRow) {
        lanternRow.style.willChange = 'filter';
        lanternRow.style.transition = 'filter 70ms steps(1, end)';
    }

    return overlay;
}

function applySceneDarkness(shell, overlay, step, totalSteps) {
    const progress = Math.max(0, Math.min(1, step / totalSteps));
    const brightness = 1 - progress * 0.9;
    const bStr = `brightness(${Math.max(0.08, brightness).toFixed(3)})`;
    shell.style.filter = bStr;
    overlay.style.opacity = (progress * 0.54).toFixed(3);
    const lanternRow = shell.parentElement && shell.parentElement.querySelector('.bazaar-lantern-row');
    if (lanternRow) lanternRow.style.filter = bStr;
}

async function runLightSequence(direction) {
    const shell = document.querySelector('#app .game-shell');
    if (!shell) return;

    const bulbs = shell.querySelectorAll('.bazaar-light-strand .strand-bulb');
    if (!bulbs.length) return;

    const fromInnerToOuter = direction === 'in';
    const pairs = getBulbPairs(bulbs, fromInnerToOuter);
    const steps = expandBulbPairsToSteps(pairs);
    const totalSteps = steps.length;
    const overlay = ensureBlackoutOverlay(shell);

    if (direction === 'out') {
        Array.from(bulbs).forEach(b => b.classList.remove('strand-off'));
        applySceneDarkness(shell, overlay, 0, totalSteps);
        await sleep(70);

        for (let i = 0; i < steps.length; i++) {
            steps[i].forEach(b => b.classList.add('strand-off'));
            applySceneDarkness(shell, overlay, i + 1, totalSteps);
            await sleep(110);
        }
        await sleep(220);
        return;
    }

    Array.from(bulbs).forEach(b => b.classList.add('strand-off'));
    applySceneDarkness(shell, overlay, totalSteps, totalSteps);
    await sleep(150);

    for (let i = 0; i < steps.length; i++) {
        steps[i].forEach(b => b.classList.remove('strand-off'));
        applySceneDarkness(shell, overlay, totalSteps - (i + 1), totalSteps);
        await sleep(110);
    }

    shell.style.filter = '';
    overlay.style.opacity = '0';
    const lanternRow = shell.parentElement && shell.parentElement.querySelector('.bazaar-lantern-row');
    if (lanternRow) lanternRow.style.filter = '';
}

function setShellLightsInstant(off) {
    const shell = document.querySelector('#app .game-shell');
    if (!shell) return;

    const bulbs = shell.querySelectorAll('.bazaar-light-strand .strand-bulb');
    const overlay = ensureBlackoutOverlay(shell);

    if (off) {
        Array.from(bulbs).forEach(b => b.classList.add('strand-off'));
        shell.style.filter = 'brightness(0.08)';
        overlay.style.opacity = '0.96';
        return;
    }

    Array.from(bulbs).forEach(b => b.classList.remove('strand-off'));
    shell.style.filter = '';
    overlay.style.opacity = '0';
}

async function sendCommand(command, data = {}) {
    if (command === 'start') {
        if (startTransitionInProgress) return;
        stopScoresBgm(true);

        // Determine game mode and send appropriate data
        let requestData = {};
        
        if (gameMode === 'bot-vs-bot') {
            requestData = {
                mode: 'bot',
                agent1: selectedPlayer1,
                agent2: selectedPlayer2
            };
        } else if (gameMode === 'human-vs-bot') {
            requestData = {
                mode: 'human-vs-bot',
                agent2: selectedPlayer2
            };
        } else {
            requestData = {
                mode: 'human'
            };
        }
        
        // Store player names and request data for the versus animation
        pendingStartData = requestData;
        pendingP1Name = getSelectedPlayerName(1);
        pendingP2Name = getSelectedPlayerName(2);
        
        SFX.click();
        startTransitionInProgress = true;
        showingPreGame = true;

        pendingStartRequest = fetch('/api/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(requestData)
        }).then(async (res) => {
            if (!res.ok) {
                let errorMessage = 'Cannot start game';
                try {
                    const payload = await res.json();
                    if (payload && payload.error) errorMessage = payload.error;
                } catch (_) {
                    // Ignore parse errors and keep generic message.
                }
                throw new Error(errorMessage);
            }
            return res;
        });

        try {
            await runLightSequence('out');
            showPreGameScreen();
            await runLightSequence('in');
        } catch (err) {
            console.error('Start error:', err);
            showingPreGame = false;
            await runLightSequence('in');
            pendingStartRequest = null;
        } finally {
            startTransitionInProgress = false;
        }
    } else if (command === 'reset') {
        if (startTransitionInProgress) return;
        stopScoresBgm(true);

        SFX.click();
        startTransitionInProgress = true;

        // Reset all transition flags
        endGameShown = false;
        showingEndGameTransition = false;
        showingVersusAnimation = false;
        showingPreGame = false;
        showingInstructions = false;

        try {
            await runLightSequence('out');

            const resetResponse = await fetch('/api/reset', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            });

            if (!resetResponse.ok) {
                throw new Error(`Reset failed with status ${resetResponse.status}`);
            }

            // Pull latest state immediately so the setup screen is visible before lights return.
            const stateResponse = await fetch('/api/state');
            if (stateResponse.ok) {
                prevHostState = gameState;
                hostCardSnapshot = captureHostCardSnapshot();
                prevHostHandDisplayOrders = hostHandDisplayOrders.map((slots) => [...(slots || [])]);
                prevHostMarketDisplaySlots = [...hostMarketDisplaySlots];
                gameState = await stateResponse.json();
                updateConnectedPlayersList(gameState);
            }
        } catch (err) {
            console.error('Reset error:', err);
        } finally {
            startTransitionInProgress = false;
            pendingUndimFromDark = true;
            renderGame();

            try {
                await runLightSequence('in');
            } catch (lightErr) {
                console.error('Reset light restore error:', lightErr);
            }
        }
    }
}

function copyPlayerUrl() {
    const input = document.getElementById('playerUrlInput');
    if (input) {
        input.select();
        input.setSelectionRange(0, 99999); // For mobile devices
        
        // Try the modern clipboard API first, fall back to execCommand
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(input.value).then(() => {
                showCopySuccess();
            }).catch(err => {
                console.error('Clipboard API failed, trying execCommand:', err);
                fallbackCopy(input);
            });
        } else {
            fallbackCopy(input);
        }
    }
}

function fallbackCopy(input) {
    try {
        document.execCommand('copy');
        showCopySuccess();
    } catch (err) {
        console.error('Failed to copy:', err);
        alert('Failed to copy URL. Please copy manually.');
    }
}

function showCopySuccess() {
    const button = document.querySelector('#playerUrlInput + button');
    if (button) {
        const originalHTML = button.innerHTML;
        button.innerHTML = '<i class="fa-solid fa-check"></i>';
        button.classList.remove('bg-blue-600', 'hover:bg-blue-700');
        button.classList.add('bg-green-600');
        setTimeout(() => {
            button.innerHTML = originalHTML;
            button.classList.remove('bg-green-600');
            button.classList.add('bg-blue-600', 'hover:bg-blue-700');
        }, 2000);
    }

function captureHostCardSnapshot() {
    return Array.from(document.querySelectorAll('[data-card-zone][data-good-type]')).map((el) => ({
        zone: el.dataset.cardZone,
        goodType: el.dataset.goodType,
        playerIndex: el.dataset.playerIndex || '',
        cardCopy: Number(el.dataset.cardCopy || 0),
        slot: Number(el.dataset.cardSlot || -1),
        rect: el.getBoundingClientRect(),
        node: el.cloneNode(true)
    })).filter((entry) => entry.rect.width > 0 && entry.rect.height > 0);
}

function animateHostHandReflow(prevSnapshot) {
    if (!shouldAnimateCardTransitions()) return;
    if (!Array.isArray(prevSnapshot) || !prevSnapshot.length) return;

    prevSnapshot
        .filter((entry) => entry.zone === 'hand')
        .forEach((entry) => {
            const selector = `[data-card-zone="hand"][data-player-index="${entry.playerIndex}"][data-good-type="${entry.goodType}"][data-card-copy="${entry.cardCopy}"]`;
            const el = document.querySelector(selector);
            if (!el) return;

            const nextRect = el.getBoundingClientRect();
            if (!nextRect.width || !nextRect.height) return;

            const dx = entry.rect.left - nextRect.left;
            const dy = entry.rect.top - nextRect.top;
            if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return;

            el.style.transition = 'none';
            el.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
            requestAnimationFrame(() => {
                el.style.transition = 'transform 260ms cubic-bezier(0.22, 1, 0.36, 1)';
                el.style.transform = 'translate3d(0, 0, 0)';
            });
        });
}

function getDisplayedHandCounts(goods, maxHandSize = 7) {
    const counts = {};
    let cardsRendered = 0;
    Object.entries(goods || {})
        .filter(([type]) => type !== 'CAMEL')
        .forEach(([goodType, count]) => {
            if (cardsRendered >= maxHandSize) return;
            const cardsToShow = Math.min(count, maxHandSize - cardsRendered);
            if (cardsToShow > 0) {
                counts[goodType] = cardsToShow;
                cardsRendered += cardsToShow;
            }
        });
    return counts;
}

function buildVisibleHandOrder(previousOrder, goods, maxHandSize = 7) {
    const nextOrder = Array(maxHandSize).fill(null);
    const remaining = {};

    Object.entries(goods || {}).forEach(([goodType, count]) => {
        if (goodType === 'CAMEL') return;
        remaining[goodType] = count;
    });

    (previousOrder || []).slice(0, maxHandSize).forEach((goodType, slotIndex) => {
        if (goodType && (remaining[goodType] || 0) > 0) {
            nextOrder[slotIndex] = goodType;
            remaining[goodType] -= 1;
        }
    });

    Object.entries(goods || {}).forEach(([goodType]) => {
        if (goodType === 'CAMEL') return;
        while ((remaining[goodType] || 0) > 0) {
            const emptyIndex = nextOrder.indexOf(null);
            if (emptyIndex === -1) break;
            nextOrder[emptyIndex] = goodType;
            remaining[goodType] -= 1;
        }
    });

    return nextOrder;
}

function buildVisibleMarketSlots(previousSlots, market, maxMarketSize = 5) {
    const nextSlots = Array(maxMarketSize).fill(null);
    const remaining = {};

    Object.entries(market || {}).forEach(([goodType, count]) => {
        remaining[goodType] = count;
    });

    (previousSlots || []).slice(0, maxMarketSize).forEach((goodType, slotIndex) => {
        if (goodType && (remaining[goodType] || 0) > 0) {
            nextSlots[slotIndex] = goodType;
            remaining[goodType] -= 1;
        }
    });

    Object.entries(market || {}).forEach(([goodType]) => {
        while ((remaining[goodType] || 0) > 0) {
            const emptyIndex = nextSlots.indexOf(null);
            if (emptyIndex === -1) break;
            nextSlots[emptyIndex] = goodType;
            remaining[goodType] -= 1;
        }
    });

    return nextSlots;
}

function shouldAnimateCardTransitions() {
    const speed = Number(gameState?.botSpeed ?? 1);
    return Number.isFinite(speed) ? speed <= 1 : true;
}

function animateHostCardDrawOut(snapshotEntry, delay = 0) {
    if (!shouldAnimateCardTransitions()) return;
    if (!snapshotEntry?.node || !snapshotEntry.rect?.width) return;

    const run = () => {
        SFX.card();
        const ghost = snapshotEntry.node;
        const rect = snapshotEntry.rect;
        ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;` +
            `width:${rect.width}px;height:${rect.height}px;margin:0;z-index:1200;` +
            `pointer-events:none;will-change:transform;`;
        document.body.appendChild(ghost);

        const paths = Array.from(ghost.querySelectorAll('svg path, svg circle, svg ellipse, svg line, svg polyline'));
        const lengths = paths.map((path) => {
            try { return path.getTotalLength() || 200; } catch (e) { return 200; }
        });

        paths.forEach((path, idx) => {
            path.style.strokeDasharray = `${lengths[idx]}`;
            path.style.strokeDashoffset = '0';
        });

        void ghost.offsetHeight;

        const duration = 320;
        paths.forEach((path, idx) => {
            path.style.transition = `stroke-dashoffset ${duration}ms cubic-bezier(0.55, 0, 1, 0.8) ${idx * 22}ms`;
            path.style.strokeDashoffset = `${lengths[idx]}`;
        });

        ghost.style.transition = `transform ${duration}ms cubic-bezier(0.4, 0, 1, 0.8)`;
        ghost.style.transform = 'scale(0.8) translateY(-8px)';
        setTimeout(() => {
            ghost.remove();
            // Clean up placeholder styling from the actual DOM element if it exists
            const actualEl = document.querySelector(
                `[data-card-zone="${snapshotEntry.zone}"][data-good-type="${snapshotEntry.goodType}"][data-card-slot="${snapshotEntry.slot}"]${snapshotEntry.playerIndex ? `[data-player-index="${snapshotEntry.playerIndex}"]` : ''}`
            );
            if (actualEl) {
                setCardSlotPlaceholder(actualEl, false);
            }
        }, duration + 220);
    };

    if (delay > 0) {
        setTimeout(run, delay);
    } else {
        run();
    }
}

function animateHostCardDrawIn(el, delay = 0) {
    if (!el) return;

    if (!shouldAnimateCardTransitions()) {
        revealHandTarget(el);
        return;
    }

    // Always hide the target initially
    hideHandTarget(el);

    const start = () => {
        SFX.card();
        requestAnimationFrame(() => requestAnimationFrame(() => {
            el.style.transition = 'none';
            el.style.opacity = '1';
            el.style.transform = 'scale(0.88) translateY(6px)';
            void el.offsetWidth;
            el.style.transition = 'transform 280ms cubic-bezier(0.22, 1, 0.36, 1)';
            el.style.transform = 'scale(1) translateY(0)';
        }));
    };

    if (delay > 0) {
        setTimeout(start, delay);
    } else {
        start();
    }
}

function animateHostCardDealFromDeck(targetEl, delay = 0) {
    if (!targetEl) return;

    if (!shouldAnimateCardTransitions()) {
        revealHandTarget(targetEl);
        return;
    }

    // Always hide the target initially
    hideHandTarget(targetEl);

    const run = () => {
        const deckEl = document.getElementById('market-deck-pile');
        if (!deckEl) {
            animateHostCardDrawIn(targetEl, 0);
            return;
        }

        const src = deckEl.getBoundingClientRect();
        const dst = targetEl.getBoundingClientRect();
        if (!src.width || !dst.width) {
            animateHostCardDrawIn(targetEl, 0);
            return;
        }

        SFX.card();

        targetEl.style.transition = 'none';
        targetEl.style.transform = 'none';
        targetEl.style.transformOrigin = '50% 50%';

        const back = document.createElement('div');
        back.className = 'goods-card border-2 rounded-lg w-20 h-28 flex flex-col items-center justify-center gap-1 font-bold text-white shadow-lg';
        back.setAttribute('aria-hidden', 'true');
        back.style.cssText = `position:fixed;left:${src.left}px;top:${src.top}px;width:${src.width}px;height:${src.height}px;` +
            'margin:0;z-index:1260;pointer-events:none;will-change:transform;backface-visibility:hidden;' +
            'border-color:#7d3a2a;background:linear-gradient(180deg,#6f2d1f,#51221a);color:#ffeecf;';
        back.innerHTML = getDeckBackHandIconSvg('svg-lg');
        document.body.appendChild(back);

        const dx = (dst.left + dst.width / 2) - (src.left + src.width / 2);
        const dy = (dst.top + dst.height / 2) - (src.top + src.height / 2);
        const firstLeg = 320;
        const flipLeg = 220;

        back.animate([
            { transform: 'translate3d(0,0,0) rotateZ(0deg) scale(1)' },
            { transform: `translate3d(${dx}px, ${dy}px, 0) rotateZ(1.2deg) scale(1)` }
        ], {
            duration: firstLeg,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            fill: 'forwards'
        }).onfinish = () => {
            requestAnimationFrame(() => {
                if (targetEl.dataset?.cardZone !== 'hand') {
                    setCardSlotPlaceholder(targetEl, false);
                }
                targetEl.style.opacity = '1';
                targetEl.style.transition = 'none';
                targetEl.style.transformOrigin = '50% 50%';
                targetEl.style.backfaceVisibility = 'hidden';
                targetEl.style.transformStyle = 'preserve-3d';
                targetEl.style.transform = 'perspective(900px) rotateY(-180deg) scale(0.98)';
                void targetEl.offsetWidth;

                const flipEase = 'cubic-bezier(0.22, 1, 0.36, 1)';
                back.animate([
                    { transform: `translate3d(${dx}px, ${dy}px, 0) perspective(900px) rotateY(0deg) scale(1)` },
                    { transform: `translate3d(${dx}px, ${dy}px, 0) perspective(900px) rotateY(180deg) scale(0.98)` }
                ], {
                    duration: flipLeg,
                    easing: flipEase,
                    fill: 'forwards'
                }).onfinish = () => back.remove();

                targetEl.style.transition = `transform ${flipLeg}ms ${flipEase}`;
                targetEl.style.transform = 'perspective(900px) rotateY(0deg) scale(1)';
            });
        };
    };

    if (delay > 0) {
        setTimeout(run, delay);
    } else {
        run();
    }
}

function animateOpeningDealSequence() {
    if (!shouldAnimateCardTransitions()) return;

    const marketTargets = Array.from(document.querySelectorAll('[data-card-zone="market"][data-card-slot]'))
        .sort((a, b) => Number(a.dataset.cardSlot || 0) - Number(b.dataset.cardSlot || 0));

    const handTargetsByPlayer = [0, 1].map((playerIdx) => (
        Array.from(document.querySelectorAll(`[data-card-zone="hand"][data-player-index="${playerIdx}"][data-card-slot]`))
            .sort((a, b) => Number(a.dataset.cardSlot || 0) - Number(b.dataset.cardSlot || 0))
    ));

    const handTargets = [];
    const maxSlots = Math.max(handTargetsByPlayer[0].length, handTargetsByPlayer[1].length);
    for (let slot = 0; slot < maxSlots; slot++) {
        if (handTargetsByPlayer[0][slot]) handTargets.push(handTargetsByPlayer[0][slot]);
        if (handTargetsByPlayer[1][slot]) handTargets.push(handTargetsByPlayer[1][slot]);
    }

    let delay = 80;
    marketTargets.forEach((el) => {
        animateHostCardDealFromDeck(el, delay);
        delay += 120;
    });

    delay += 120;
    handTargets.forEach((el) => {
        animateHostCardDealFromDeck(el, delay);
        delay += 95;
    });
}

function expandGoodsMap(goodsMap) {
    const expanded = [];
    Object.entries(goodsMap || {}).forEach(([goodType, count]) => {
        if (goodType === 'CAMEL') return;
        const n = Number(count) || 0;
        for (let i = 0; i < n; i++) expanded.push(goodType);
    });
    return expanded;
}

function animateHostCardFly(snapshotEntry, targetEl, delay = 0) {
    if (!snapshotEntry?.node || !snapshotEntry.rect?.width || !targetEl) return;

    if (!shouldAnimateCardTransitions()) {
        revealHandTarget(targetEl);
        if (targetEl.dataset?.cardZone) {
            targetEl.style.transition = 'none';
            targetEl.style.opacity = '1';
            targetEl.style.transform = 'scale(1)';
        }
        return;
    }

    hideHandTarget(targetEl);

    const run = () => {
        SFX.card();
        const ghost = snapshotEntry.node;
        const rect = snapshotEntry.rect;
        ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;` +
            `width:${rect.width}px;height:${rect.height}px;margin:0;z-index:1250;` +
            `pointer-events:none;will-change:transform;`;
        document.body.appendChild(ghost);

        const dst = targetEl.getBoundingClientRect();
        const sx = rect.left + rect.width / 2;
        const sy = rect.top + rect.height / 2;
        const tx = dst.left + dst.width / 2;
        const ty = dst.top + dst.height / 2;
        const dx = tx - sx;
        const dy = ty - sy;
        const arc = Math.max(18, Math.min(46, Math.abs(dx) * 0.12 + Math.abs(dy) * 0.08));
        const scaleTarget = dst.width > 0 && rect.width > 0 ? dst.width / rect.width : 1;
        const isHandToMarket = snapshotEntry.zone === 'hand' && targetEl.dataset?.cardZone === 'market';
        const scale25 = 1 + (scaleTarget - 1) * 0.25;
        const scale65 = 1 + (scaleTarget - 1) * 0.65;
        const flyFrames = isHandToMarket ? [
            { transform: 'translate3d(0,0,0) scale(1)', offset: 0 },
            { transform: `translate3d(${dx * 0.28}px, ${dy * 0.22 - arc * 0.45}px, 0) scale(${scale25})`, offset: 0.32 },
            { transform: `translate3d(${dx * 0.62}px, ${dy * 0.56 - arc * 0.2}px, 0) scale(${scale65})`, offset: 0.72 },
            { transform: `translate3d(${dx}px, ${dy}px, 0) scale(${scaleTarget})`, offset: 1 }
        ] : [
            { transform: 'translate3d(0,0,0) scale(1)', offset: 0 },
            { transform: `translate3d(${dx * 0.55}px, ${dy * 0.45 - arc}px, 0) scale(${(1 + scaleTarget) * 0.5})`, offset: 0.55 },
            { transform: `translate3d(${dx}px, ${dy}px, 0) scale(${scaleTarget})`, offset: 1 }
        ];

        ghost.animate(flyFrames, {
            duration: isHandToMarket ? 640 : 580,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            fill: 'forwards'
        }).onfinish = () => {
            ghost.remove();
            if (targetEl) {
                const isCardSlotTarget = !!targetEl.dataset?.cardZone;
                const isPlaceholder = targetEl.classList.contains('slot-placeholder');
                const isHand = targetEl.dataset?.cardZone === 'hand';
                if (isPlaceholder && !isHand) setCardSlotPlaceholder(targetEl, false);

                // Avoid overriding anchored transforms on static pile cards (e.g. GOODS SOLD).
                if (isCardSlotTarget) {
                    targetEl.style.transition = 'none';
                    targetEl.style.opacity = '1';
                    targetEl.style.transform = 'scale(1)';
                }
            }
        };
    };

    if (delay > 0) {
        setTimeout(run, delay);
    } else {
        run();
    }
}

function animateHostCardDelta(prev, next) {
    if (!prev || !next) return;

    if (!shouldAnimateCardTransitions()) {
        hostCardSnapshot = [];
        return;
    }

    let exitDelay = 0;
    let enterDelay = 0;

    const marketRemovals = [];
    const marketAdditions = [];
    const handRemovals = [];
    const handAdditions = [];
    const consumedRemovals = new Set();
    const consumedAdditions = new Set();
    const marketSnapshotEntries = hostCardSnapshot.filter((entry) => entry.zone === 'market');

    const pickMarketSource = (goodType) => (
        marketRemovals.find((entry) => (
            !consumedRemovals.has(entry) &&
            entry.goodType === goodType
        )) ||
        marketSnapshotEntries.find((entry) => (
            !consumedRemovals.has(entry) &&
            entry.goodType === goodType
        ))
    );

    const prevMarketSlots = prevHostMarketDisplaySlots || [];
    const nextMarketSlots = hostMarketDisplaySlots || [];
    for (let slot = 0; slot < 5; slot++) {
        const prevType = prevMarketSlots[slot] || null;
        const nextType = nextMarketSlots[slot] || null;
        if (prevType && (!nextType || prevType !== nextType)) {
            const entry = hostCardSnapshot.find((item) => item.zone === 'market' && item.slot === slot);
            if (entry) marketRemovals.push(entry);
        }
        if (nextType && (!prevType || prevType !== nextType)) {
            const el = document.querySelector(`[data-card-zone="market"][data-card-slot="${slot}"]`);
            if (el) marketAdditions.push(el);
        }
    }

    (hostHandDisplayOrders || []).forEach((slots, playerIndex) => {
        const prevSlots = (prevHostHandDisplayOrders || [])[playerIndex] || Array(7).fill(null);
        const nextSlots = slots || Array(7).fill(null);
        for (let slot = 0; slot < 7; slot++) {
            const prevType = prevSlots[slot] || null;
            const nextType = nextSlots[slot] || null;
            if (prevType && (!nextType || prevType !== nextType)) {
                const entry = hostCardSnapshot.find((item) => item.zone === 'hand' && item.playerIndex === `${playerIndex}` && item.slot === slot);
                if (entry) handRemovals.push(entry);
            }
            if (nextType && (!prevType || prevType !== nextType)) {
                const el = document.querySelector(`[data-card-zone="hand"][data-player-index="${playerIndex}"][data-card-slot="${slot}"]`);
                if (el) handAdditions.push(el);
            }
        }
    });

    const lastChanged = JSON.stringify(prev.lastAction || null) !== JSON.stringify(next.lastAction || null);
    if (lastChanged && next.lastAction) {
        const actorName = next.lastAction.player;
        const actorIdx = (next.players || []).findIndex((p) => p.name === actorName);
        const actionType = next.lastAction.type;

        if (actionType === 'Sell') {
            const soldTarget = document.getElementById('market-sold-pile');
            if (soldTarget && actorIdx >= 0) {
                const offeredTypes = expandGoodsMap(next.lastAction.offered);
                offeredTypes.forEach((goodType, idx) => {
                    const source = handRemovals.find((entry) => (
                        !consumedRemovals.has(entry) &&
                        entry.playerIndex === `${actorIdx}` &&
                        entry.goodType === goodType
                    ));
                    if (!source) return;
                    consumedRemovals.add(source);
                    animateHostCardFly(source, soldTarget, idx * 85);
                });
            }
        }

        if (actionType === 'Take' || actionType === 'Trade') {
            const requestedTypes = expandGoodsMap(next.lastAction.requested);
            requestedTypes.forEach((goodType, idx) => {
                const source = pickMarketSource(goodType);
                const target = handAdditions.find((el) => (
                    !consumedAdditions.has(el) &&
                    el.dataset.playerIndex === `${actorIdx}` &&
                    el.dataset.goodType === goodType
                ));
                if (!source || !target) return;
                consumedRemovals.add(source);
                consumedAdditions.add(target);
                animateHostCardFly(source, target, idx * 80);
            });

            const requestedCamels = Number(next.lastAction.requested?.CAMEL || 0);
            const camelTarget = actorIdx >= 0 ? document.getElementById(`camel-slot-${actorIdx}`) : null;
            if (camelTarget && requestedCamels > 0) {
                const camelBaseDelay = requestedTypes.length * 80;
                const camelSources = marketSnapshotEntries
                    .filter((entry) => !consumedRemovals.has(entry) && entry.goodType === 'CAMEL')
                    .sort((a, b) => Number(a.slot || 0) - Number(b.slot || 0))
                    .slice(0, requestedCamels);

                camelSources.forEach((source, i) => {
                    consumedRemovals.add(source);
                    animateHostCardFly(source, camelTarget, camelBaseDelay + i * 80);
                });

                // If camels are replenished immediately, animate them as fresh market deals
                // even when a camel remains in the same slot after diffing.
                const prevCamelCount = Number(prev.market?.CAMEL || 0);
                const nextCamelCount = Number(next.market?.CAMEL || 0);
                const expectedRemainingCamels = Math.max(0, prevCamelCount - camelSources.length);
                const replacementCamelCount = Math.max(0, nextCamelCount - expectedRemainingCamels);

                if (replacementCamelCount > 0) {
                    const removedCamelSlots = new Set(camelSources.map((entry) => Number(entry.slot || -1)).filter((slot) => slot >= 0));
                    const replacementTargets = [];

                    for (let slot = 0; slot < 5; slot++) {
                        if (nextMarketSlots[slot] !== 'CAMEL') continue;
                        const el = document.querySelector(`[data-card-zone="market"][data-card-slot="${slot}"]`);
                        if (!el || consumedAdditions.has(el)) continue;
                        const likelyReplacement = removedCamelSlots.has(slot) || prevMarketSlots[slot] !== 'CAMEL';
                        if (likelyReplacement) replacementTargets.push(el);
                    }

                    if (replacementTargets.length < replacementCamelCount) {
                        for (let slot = 0; slot < 5; slot++) {
                            if (nextMarketSlots[slot] !== 'CAMEL') continue;
                            const el = document.querySelector(`[data-card-zone="market"][data-card-slot="${slot}"]`);
                            if (!el || consumedAdditions.has(el) || replacementTargets.includes(el)) continue;
                            replacementTargets.push(el);
                        }
                    }

                    const replacementBaseDelay = camelBaseDelay + camelSources.length * 80;
                    replacementTargets.slice(0, replacementCamelCount).forEach((target, idx) => {
                        consumedAdditions.add(target);
                        animateHostCardDealFromDeck(target, replacementBaseDelay + idx * 120);
                    });
                }
            }
        }

        if (actionType === 'Trade') {
            const offeredTypes = expandGoodsMap(next.lastAction.offered);
            const baseDelay = expandGoodsMap(next.lastAction.requested).length * 70;
            offeredTypes.forEach((goodType, idx) => {
                const source = handRemovals.find((entry) => (
                    !consumedRemovals.has(entry) &&
                    entry.playerIndex === `${actorIdx}` &&
                    entry.goodType === goodType
                ));
                const target = marketAdditions.find((el) => (
                    !consumedAdditions.has(el) &&
                    el.dataset.goodType === goodType
                ));
                if (!source || !target) return;
                consumedRemovals.add(source);
                consumedAdditions.add(target);
                setCardSlotPlaceholder(target, true);
                animateHostCardFly(source, target, baseDelay + idx * 80);
            });
        }
    }

    handRemovals.forEach((entry, idx) => {
        if (consumedRemovals.has(entry)) return;
        animateHostCardDrawOut(entry, idx * 55);
    });
    exitDelay = handRemovals.length * 55;

    handAdditions.forEach((el, idx) => {
        if (consumedAdditions.has(el)) return;
        animateHostCardDrawIn(el, exitDelay + idx * 75);
    });

    const marketStartDelay = Math.max(exitDelay, 0) + 60;
    marketRemovals.forEach((entry, idx) => {
        if (consumedRemovals.has(entry)) return;
        animateHostCardDrawOut(entry, marketStartDelay + idx * 65);
    });
    enterDelay = marketStartDelay + marketRemovals.length * 65 + (marketRemovals.length ? 160 : 0);

    marketAdditions.forEach((el, idx) => {
        if (consumedAdditions.has(el)) return;
        animateHostCardDealFromDeck(el, enterDelay + idx * 120);
    });

    hostCardSnapshot = [];
}

function getActionDescriptionHTML(action) {
    if (!action) return '';
    
    const makeGoodSpan = (type) => {
        const style = cardStyles[type];
        return `<span class="font-semibold" style="color: ${style?.borderColor}">${style?.text || type}</span>`;
    };
    
    if (action.type === 'Sell') {
        const goods = Object.entries(action.offered || {}).map(([type, count]) => `${count} ${makeGoodSpan(type)}`).join(', ');
        return `<span class="italic">sold ${goods}</span>`;
    } else if (action.type === 'Take') {
        const goods = Object.entries(action.requested || {}).map(([type, count]) => `${count} ${makeGoodSpan(type)}`).join(', ');
        return `<span class="italic">took ${goods}</span>`;
    } else if (action.type === 'Trade') {
        const offered = Object.entries(action.offered || {})
            .map(([type, count]) => `${count} ${makeGoodSpan(type)}`)
            .join(', ');
        const requested = Object.entries(action.requested || {})
            .map(([type, count]) => `${count} ${makeGoodSpan(type)}`)
            .join(', ');
        return `<span class="italic">traded (${offered}) for (${requested})</span>`;
    }
    return 'Unknown action';
}

function applyHostDeltaAnimations(prev, next) {
    if (!prev || !next || !next.gameStarted) return;

    animateHostHandReflow(hostCardSnapshot);
    animateHostCardDelta(prev, next);

    // Rolling stat values: score, bonus tiers, and camel count
    // When transitioning to terminal, only roll to rawScore so bonuses stay hidden until "Reveal Scores"
    (next.players || []).forEach((player, idx) => {
        const prevPlayer = (prev.players || [])[idx];
        if (!prevPlayer) return;
        const prevScore = next.isTerminal ? (prevPlayer.rawScore || 0) : (prevPlayer.score || 0);
        const nextScore = next.isTerminal ? (player.rawScore || 0) : (player.score || 0);
        animateRollingValue(document.getElementById(`hstat-${idx}-score`), prevScore, nextScore);
        animateRollingValue(document.getElementById(`hstat-${idx}-three`), prevPlayer.bonusCounts?.THREE ?? 0, player.bonusCounts?.THREE ?? 0);
        animateRollingValue(document.getElementById(`hstat-${idx}-four`), prevPlayer.bonusCounts?.FOUR ?? 0, player.bonusCounts?.FOUR ?? 0);
        animateRollingValue(document.getElementById(`hstat-${idx}-five`), prevPlayer.bonusCounts?.FIVE ?? 0, player.bonusCounts?.FIVE ?? 0);
        animateRollingValue(document.getElementById(`hstat-${idx}-camel`), prevPlayer.camelCount || 0, player.camelCount || 0);
    });

    animateHostCoinTransfers(prev, next);

    // Round pop: pulse the floor action text when round advances
    if (prev.round !== next.round) {
        const badge = document.getElementById('floor-action-text');
        if (badge) {
            badge.classList.remove('round-pop');
            void badge.offsetWidth;
            badge.classList.add('round-pop');
        }
    }
}

function animateHostCoinTransfers(prev, next) {
    const lastChanged = JSON.stringify(prev.lastAction || null) !== JSON.stringify(next.lastAction || null);
    if (!lastChanged || !next.lastAction || next.lastAction.type !== 'Sell') return;

    const soldType = Object.keys(next.lastAction.offered || {})[0];
    if (!soldType) return;
    const prevCoins = prev.marketCoins?.[soldType] || [];
    const nextCoins = next.marketCoins?.[soldType] || [];
    const removed = Math.max(0, prevCoins.length - nextCoins.length);
    if (!removed) return;

    const targetIdx = (next.players || []).findIndex(p => p.name === next.lastAction.player);
    if (targetIdx < 0) return;

    const source = document.getElementById(`market-stack-${soldType}`);
    const target = document.getElementById(`score-chip-${targetIdx}`);
    if (!source || !target) return;

    const style = cardStyles[soldType] || cardStyles.GOLD;
    const values = prevCoins.slice(prevCoins.length - removed).reverse();
    values.forEach((val, i) => {
        setTimeout(() => { SFX.coin(); flyCoinToPlayer(source, target, val, style); }, i * 85);
    });

    const bonusDefs = [
        { tier: 'THREE', suffix: 'three', label: '3x' },
        { tier: 'FOUR', suffix: 'four', label: '4x' },
        { tier: 'FIVE', suffix: 'five', label: '5x' }
    ];

    let offset = values.length * 85;
    bonusDefs.forEach(({ tier, suffix, label }) => {
        const prevBonus = prev.marketBonusTokens?.[tier] ?? 0;
        const nextBonus = next.marketBonusTokens?.[tier] ?? 0;
        const removedBonus = Math.max(0, prevBonus - nextBonus);
        if (!removedBonus) return;
        const bSource = document.getElementById(`bonus-stack-${tier}`);
        const bTarget = document.getElementById(`hstat-${targetIdx}-${suffix}`);
        if (!bSource || !bTarget) return;
        for (let i = 0; i < removedBonus; i++) {
            setTimeout(() => flyCoinToPlayer(bSource, bTarget, label, { borderColor: '#f2d39e' }), offset + i * 85);
        }
        offset += removedBonus * 85;
    });
}

function flyCoinToPlayer(sourceEl, targetEl, value, style) {
    const src = sourceEl.getBoundingClientRect();
    const dst = targetEl.getBoundingClientRect();
    const coin = document.createElement('div');
    coin.className = 'coin-fly';
    coin.style.left = `${src.left + src.width / 2 - 15}px`;
    coin.style.top = `${src.top + src.height / 2 - 15}px`;
    coin.style.background = `linear-gradient(180deg, rgba(255,255,255,0.24), rgba(0,0,0,0.08)), ${style.coinColor || '#7b3f2d'}`;
    coin.style.border = `2px solid ${style.borderColor || '#ffe3b8'}`;
    coin.textContent = `${value}`;
    document.body.appendChild(coin);

    const dx = (dst.left + dst.width / 2) - (src.left + src.width / 2);
    const dy = (dst.top + dst.height / 2) - (src.top + src.height / 2);
    coin.animate([
        { transform: 'translate3d(0,0,0) scale(1)', opacity: 1 },
        { transform: `translate3d(${dx * 0.55}px,${dy * 0.35 - 28}px,0) scale(0.92)`, opacity: 0.95 },
        { transform: `translate3d(${dx}px,${dy}px,0) scale(0.48)`, opacity: 0 }
    ], {
        duration: 560,
        easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
        fill: 'forwards'
    }).onfinish = () => coin.remove();
}

function animateRollingValue(el, fromValue, toValue) {
    if (!el) return;
    const from = Number(fromValue ?? 0);
    const to = Number(toValue ?? 0);
    if (!Number.isFinite(from) || !Number.isFinite(to)) {
        el.textContent = `${toValue ?? 0}`;
        return;
    }
    if (from === to) {
        el.textContent = `${to}`;
        return;
    }

    const increasing = to > from;
    const diff = Math.abs(to - from);
    const stepSize = Math.max(1, Math.ceil(diff / 10));
    const token = `${Date.now()}-${Math.random()}`;
    el.dataset.rollToken = token;
    let current = from;

    const runStep = () => {
        if (el.dataset.rollToken !== token) return;
        if (current === to) {
            el.textContent = `${to}`;
            return;
        }

        const next = increasing
            ? Math.min(to, current + stepSize)
            : Math.max(to, current - stepSize);

        const outY = increasing ? 10 : -10;
        const inY = increasing ? -10 : 10;

        el.animate([
            { transform: 'translateY(0)', opacity: 1 },
            { transform: `translateY(${outY}px)`, opacity: 0 }
        ], {
            duration: 70,
            easing: 'ease-in',
            fill: 'forwards'
        }).onfinish = () => {
            if (el.dataset.rollToken !== token) return;
            el.textContent = `${next}`;
            el.animate([
                { transform: `translateY(${inY}px)`, opacity: 0 },
                { transform: 'translateY(0)', opacity: 1 }
            ], {
                duration: 70,
                easing: 'ease-out',
                fill: 'forwards'
            }).onfinish = () => {
                current = next;
                runStep();
            };
        };
    };

    el.textContent = `${from}`;
    runStep();
}
