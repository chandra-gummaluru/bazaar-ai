                <span class="setup-caret" aria-hidden="true">&#9660;</span>
            </div>
            <span class="turn-torch pillar-torch pillar-torch-right" aria-hidden="true"></span>
        </div>
    </div>

    <div id="qr-code-section">${qrCodeSection}</div>

    <div class="bazaar-front-floor" aria-hidden="true"></div>
</div>
    `;

    if (pendingUndimFromDark) {
        const shell = app.querySelector('.game-shell');
        if (shell) {
            const bulbs = shell.querySelectorAll('.bazaar-light-strand .strand-bulb');
            Array.from(bulbs).forEach((b) => b.classList.add('strand-off'));
            const overlay = ensureBlackoutOverlay(shell);
            applySceneDarkness(shell, overlay, 1, 1);
        }
        pendingUndimFromDark = false;
    }
}

function selectGameMode(mode) {
    SFX.click();
    gameMode = mode;

    // Notify backend of the selected mode
    fetch('/api/set_mode', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ mode: mode })
    }).catch(err => console.error('Set mode error:', err));

    // Update sign selection in-place (no full re-render)
    const signsArea = document.getElementById('mode-signs-area');
    if (signsArea) {
        signsArea.querySelectorAll('.mode-sign').forEach(btn => {
            const isSelected = btn.dataset.mode === mode;
            btn.classList.toggle('mode-sign-selected', isSelected);
        });
    }

    // Rebuild player setup section
    const needsQRCode = mode === 'human-vs-human' || mode === 'human-vs-bot';
    const playerUrl = `${window.location.protocol}//${window.location.host}/player.html`;

    const generateOptions = (players, selectedValue) => {
        return players.map(p => {
            const value = p.id || p;
            const name = p.name || p;
            const selected = value === selectedValue ? ' selected' : '';
            return `<option value="${value}"${selected}>${name}</option>`;
        }).join('');
    };

    const humanPlayers = connectedPlayers.length > 0
        ? connectedPlayers
        : [{ id: '', name: 'No players connected' }];
    const botPlayersList = botPlayers.map(b => ({ id: b.id || b, name: b.name || b }));

    let p1opts = '', p2opts = '';
    if (mode === 'human-vs-human') {
        p1opts = generateOptions(humanPlayers, selectedPlayer1);
        p2opts = generateOptions(humanPlayers, selectedPlayer2);
    } else if (mode === 'human-vs-bot') {
        p1opts = generateOptions(humanPlayers, selectedPlayer1);
        p2opts = generateOptions(botPlayersList, selectedPlayer2);
    } else if (mode === 'bot-vs-bot') {
        p1opts = generateOptions(botPlayersList, selectedPlayer1);
        p2opts = generateOptions(botPlayersList, selectedPlayer2);
    }

    const p1s = document.getElementById('player1Select');
    if (p1s) { p1s.disabled = false; p1s.innerHTML = '<option value="">Select...</option>' + p1opts; }
    const p2s = document.getElementById('player2Select');
    if (p2s) { p2s.disabled = false; p2s.innerHTML = '<option value="">Select...</option>' + p2opts; }

    const hiddenQRHTML = '<div class="qr-sign-wrap qr-sign-hidden" id="qr-sign-wrap"></div>';
    const buildQRHTML = (extraClass = '') => `
        <div class="qr-sign-wrap qr-sign-center ${extraClass}" id="qr-sign-wrap">
            <div class="qr-sign-ropes"></div>
            <div class="qr-sign">
                <div class="qr-sign-label">Join the Bazaar</div>
                <div class="qr-sign-code"><div id="qrcode"></div></div>
                <div class="qr-sign-url">${playerUrl}</div>
            </div>
        </div>`;

    if (qrBannerHideTimer) {
        clearTimeout(qrBannerHideTimer);
        qrBannerHideTimer = null;
    }

    const qrEl = document.getElementById('qr-code-section');
    const existingWrap = document.getElementById('qr-sign-wrap');
    const wasVisible = !!(existingWrap && !existingWrap.classList.contains('qr-sign-hidden'));

    if (qrEl) {
        if (needsQRCode) {
            const entering = !wasVisible;
            if (entering) {
                qrEl.innerHTML = buildQRHTML('qr-sign-enter');
                requestAnimationFrame(() => {
                    const wrap = document.getElementById('qr-sign-wrap');
                    if (wrap) wrap.classList.remove('qr-sign-enter');
                });
            }
        } else if (wasVisible && existingWrap) {
            existingWrap.classList.add('qr-sign-exit-up');
            qrBannerHideTimer = setTimeout(() => {
                const latestQrEl = document.getElementById('qr-code-section');
                if (latestQrEl) latestQrEl.innerHTML = hiddenQRHTML;
                qrBannerHideTimer = null;
            }, 430);
        } else {
            qrEl.innerHTML = hiddenQRHTML;
        }
    }

    if (needsQRCode && typeof QRCode !== 'undefined') {
        const qrcodeEl = document.getElementById('qrcode');
        if (qrcodeEl && !qrcodeEl.firstChild) {
            qrcodeEl.innerHTML = '';
            new QRCode(qrcodeEl, {
                text: playerUrl,
                width: 160,
                height: 160,
                colorDark: '#5b2f1d',
                colorLight: '#f7ecd8',
                correctLevel: QRCode.CorrectLevel.L
            });
        }
    }

    updateStartButton();
}

function updatePlayerSelection() {
    SFX.select();
    const player1Select = document.getElementById('player1Select');
    const player2Select = document.getElementById('player2Select');
    
    if (player1Select) {
        selectedPlayer1 = player1Select.value;
    }
    if (player2Select) {
        selectedPlayer2 = player2Select.value;
    }
    
    // Only update the start button instead of re-rendering everything
    updateStartButton();
}

function updateStartButton() {
    const canStart = gameMode && ((gameMode === 'bot-vs-bot') 
        ? (selectedPlayer1 && selectedPlayer2)
        : (gameMode === 'human-vs-bot') 
            ? (gameState && gameState.player1Connected && selectedPlayer2)
            : (gameState && gameState.playersReady));

    const howToPlayButton = `<button onclick="showInstructionsScreen()" class="action-btn px-6 py-3 rounded-lg font-bold text-sm cursor-pointer">
                <i class="fa-solid fa-scroll mr-2"></i>HOW TO PLAY
            </button>`;

    const startButton = canStart
        ? `<button onclick="sendCommand('start')" class="action-btn px-6 py-3 rounded-lg font-bold text-sm cursor-pointer">
            <i class="fa-solid fa-gears mr-2"></i>SETUP GAME
           </button>`
        : `<button disabled class="action-btn px-6 py-3 rounded-lg font-bold text-sm cursor-not-allowed">
            <i class="fa-solid fa-gears mr-2"></i>SETUP GAME
           </button>`;

    const startButtonContainer = document.getElementById('setup-start-btn');
    if (startButtonContainer) {
        startButtonContainer.innerHTML = howToPlayButton + startButton;
    }
}

function resetMode() {
    gameMode = null;
    selectedPlayer1 = null;
    selectedPlayer2 = null;
    
    // Clear the pending mode on backend
    fetch('/api/set_mode', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ mode: null })
    }).catch(err => console.error('Clear mode error:', err));
    
    renderGame();
}

function renderGame() {
    const app = document.getElementById('app');
    const isTerminalNow = gameState && gameState.isTerminal;
    if (isTerminalNow) {
        if (!marketAmbienceFading && marketAmbienceAudio && !marketAmbienceAudio.paused) {
            fadeOutMarketAmbience(2000);
        }
    } else {
        syncMarketAmbience(true);
    }
    const shouldPlayFireAmbience = !gameState || !gameState.isTerminal;
    syncFireAmbience(shouldPlayFireAmbience);
    const shouldPlayMenuBgm = showingPreGame || showingVersusAnimation || startTransitionInProgress || !gameState || !gameState.gameStarted;
    syncMenuBgm(shouldPlayMenuBgm);
    const shouldPlayGameplayBgm = !!(gameState && gameState.gameStarted && (!gameState.isTerminal || !inPlaceScoreRevealStarted) && !showingPreGame && !showingVersusAnimation && !startTransitionInProgress);
    syncGameplayBgm(shouldPlayGameplayBgm);
    
    // Don't render if we're showing the end game transition, scores, versus animation, pre-game, or instructions screen
    if (startTransitionInProgress || showingEndGameTransition || showingVersusAnimation || showingPreGame || showingInstructions) {
        return;
    }

    if (!gameState || !gameState.gameStarted || !gameState.isTerminal) {
        stopScoresBgm(true);
    }
    
    // Always show mode selection at top, then player setup below if mode is selected
    if (!gameState || !gameState.gameStarted) {
        _hostGameActive = false;
        hostHandDisplayOrders = [];
        prevHostHandDisplayOrders = [];
        hostMarketDisplaySlots = [];
        prevHostMarketDisplaySlots = [];
        app.innerHTML = renderSetupScreen();

        if (gameMode && (gameMode === 'human-vs-human' || gameMode === 'human-vs-bot') && typeof QRCode !== 'undefined') {
            setTimeout(() => {
                const qrcodeEl = document.getElementById('qrcode');
                if (qrcodeEl) {
                    const playerUrl = `${window.location.protocol}//${window.location.host}/player.html`;
                    qrcodeEl.innerHTML = '';
                    new QRCode(qrcodeEl, {
                        text: playerUrl,
                        width: 160,
                        height: 160,
                        colorDark: '#5b2f1d',
                        colorLight: '#f7ecd8',
                        correctLevel: QRCode.CorrectLevel.L
                    });
                }
            }, 100);
        }

        return;
    }
    
    // Regular game display
    const isMarketClosed = !!gameState.isTerminal;
    const hideCardsForClose = false;
    hostMarketDisplaySlots = buildVisibleMarketSlots(hostMarketDisplaySlots, gameState.market || {}, 5);
    const marketCards = getMarketCardsRowHtml({
        displaySlots: hostMarketDisplaySlots,
        hideCardsForClose,
        slotCount: 5,
        renderCardHtml: ({ goodType, slotIndex }) => createCard(
            goodType,
            'lg',
            `data-card-zone="market" data-good-type="${goodType}" data-card-slot="${slotIndex}"`
        )
    });

    let winningPlayerIdx = -1;
    if (gameState.isTerminal) {
        if (gameState.botTimeoutPlayer) {
            winningPlayerIdx = (gameState.players || []).findIndex(p => p.name !== gameState.botTimeoutPlayer);
        } else {
            const scores = (gameState.players || []).map(p => p.score || 0);
            const maxScore = Math.max(...scores);
            const winners = (gameState.players || []).filter(p => (p.score || 0) === maxScore);
            if (winners.length === 1) {
                winningPlayerIdx = (gameState.players || []).findIndex(p => p.name === winners[0].name);
            }
        }
    }

    const players = gameState.players.map((player, idx) => {
        const isActive = player.name === gameState.currentPlayer;
        const isBotMode = gameState.gameMode === 'bot';
        const isConnected = isBotMode || ((idx === 0 && gameState.player1Connected) || (idx === 1 && gameState.player2Connected));
        const isWinner = gameState.isTerminal && idx === winningPlayerIdx;
        const isCelebratingWinner = isWinner && inPlaceScoreRevealStarted;
        const shouldLightTorch = gameState.isTerminal
            ? (isWinner && inPlaceScoreRevealStarted && !inPlaceScoreRevealAnimating)
            : isActive;
        
        let nameplateStateClass = '';
        if (gameState.isTerminal) {
            // No winner pill; terminal status is represented by torches + confetti.
        } else {
            if (!isConnected) {
                nameplateStateClass = 'player-nameplate-inactive';
            } else if (isActive) {
                nameplateStateClass = 'player-nameplate-active';
            }
        }

        // Player's hand (excluding camels)
        const maxHandSize = 7;
        const visibleHandOrder = buildVisibleHandOrder(hostHandDisplayOrders[idx], player.goods || {}, maxHandSize);
        hostHandDisplayOrders[idx] = visibleHandOrder;
        const seenByType = {};
        const handCards = visibleHandOrder.map((goodType, slotIndex) => {
            if (hideCardsForClose) {
                return '';
            }
            if (!goodType) {
                return '';
            }
            seenByType[goodType] = (seenByType[goodType] || 0) + 1;
            return createCard(
                goodType,
                'sm',
                `data-card-zone="hand" data-player-index="${idx}" data-good-type="${goodType}" data-card-slot="${slotIndex}" data-card-copy="${seenByType[goodType] - 1}"`
            );
        }).join('');

        const camelSlotCard = hideCardsForClose
            ? ''
            : `
            <div id="camel-slot-${idx}" class="camel-slot-wrap ${(player.camelCount || 0) === 0 ? 'is-empty' : ''}">
                ${createCard('CAMEL', 'sm')}
                <span id="hstat-${idx}-camel" class="camel-slot-count roll-value">${player.camelCount || 0}</span>
            </div>
        `;

        const visibleHandRail = handCards;
        const baseRevealScore = player.rawScore || 0;
        const shouldShowBaseRevealScore = gameState.isTerminal && (!inPlaceScoreRevealStarted || inPlaceScoreRevealAnimating);
        const visibleScore = hideCardsForClose
            ? baseRevealScore
            : (shouldShowBaseRevealScore ? baseRevealScore : player.score);

        return getPlayerStripHtml({
            idx,
            playerName: player.name,
            score: visibleScore,
            bonusCounts: player.bonusCounts,
            side: idx === 0 ? 'left' : 'right',
            isActive,
            isTerminal: gameState.isTerminal,
            isCelebratingWinner,
            shouldLightTorch,
            nameplateStateClass,
            handRailHtml: visibleHandRail,
            camelSlotHtml: camelSlotCard,
            statPrefix: 'hstat'
        });
    }).map((html, idx) => `<div id="player-board-${idx}">${html}</div>`);

    const marketStacksDisplay = getMarketStacksHtml({
        marketCoins: gameState.marketCoins,
        marketBonusTokens: gameState.marketBonusTokens,
        isTerminal: gameState.isTerminal,
        tokenImgClass: 'w-8 h-8'
    });

    let floorActionText = '';
    if (!gameState.gameStarted) {
        floorActionText = gameState.playersReady ? 'Waiting to start' : 'Waiting for players';
    } else if (gameState.isTerminal) {
        floorActionText = inPlaceScoreRevealStarted
            ? 'Final tally revealed in bags'
            : 'Market closed - reveal scores';
    } else {
        if (gameState.lastAction && gameState.lastAction.player) {
            floorActionText = `${gameState.lastAction.player} ${getActionDescriptionHTML(gameState.lastAction)}`;
        } else {
            floorActionText = 'Market just opened';
        }
    }

    const marketStageHtml = getMarketStageHtml({
        marketStatusText: floorActionText,
        marketCards,
        hideCardsForClose,
        gameStarted: gameState.gameStarted,
        soldGoods: gameState.soldGoods ?? 0,
        deckSize: (Number(gameState.deckSize) || 0) + (Number(gameState.market?.CAMEL) || 0),
        pileCardClass: 'goods-card'
    });

    const currentPlayerIdx = (gameState.players || []).findIndex(p => p.name === gameState.currentPlayer);
    const vTorchIdx = (gameState.isTerminal && winningPlayerIdx >= 0 && inPlaceScoreRevealStarted && !inPlaceScoreRevealAnimating)
        ? winningPlayerIdx
        : (!gameState.isTerminal ? currentPlayerIdx : -1);
    const vLeftLitClass = vTorchIdx === 0 ? 'is-lit' : '';
    const vRightLitClass = vTorchIdx === 1 ? 'is-lit' : '';

    // Player connection status
    const player1Status = gameState.player1Connected 
        ? '<span class="text-green-700"><i class="fa-solid fa-check-circle"></i> Player 1 Connected</span>'
        : '<span class="text-red-700"><i class="fa-solid fa-times-circle"></i> Waiting for Player 1...</span>';
    
    const player2Status = gameState.player2Connected
        ? '<span class="text-green-700"><i class="fa-solid fa-check-circle"></i> Player 2 Connected</span>'
        : '<span class="text-red-700"><i class="fa-solid fa-times-circle"></i> Waiting for Player 2...</span>';

    // Start button
    const canStart = gameState.playersReady && !gameState.gameStarted;
    const startButton = gameState.gameStarted 
        ? '' 
        : `<button onclick="sendCommand('start')" class="action-btn px-4 py-2 rounded-lg font-bold text-xs border-2 transition-colors ${canStart ? 'text-amber-100 hover:text-white cursor-pointer' : 'scroll-bg text-gray-700 opacity-50 cursor-not-allowed'}" ${!canStart ? 'disabled' : ''}>
            <i class="fa-solid fa-play mr-1"></i>START GAME
           </button>`;

    const mainGameControlsHTML = gameState.isTerminal && !inPlaceScoreRevealStarted ? `

        ` : gameState.gameStarted ? (gameState.gameMode === 'bot' ? `

                    </select>

function startInPlaceScoreReveal() {
    if (!gameState || !gameState.isTerminal || inPlaceScoreRevealAnimating) return;

    inPlaceScoreRevealStarted = true;
    inPlaceScoreRevealAnimating = true;
    renderGame();
    SFX.reveal();
    playRevealScoreMusicSequence();

    const players = gameState.players || [];
    const penaltyTarget = gameState.botTimeoutPlayer || null;

    const splitTotalIntoTokenSteps = (totalValue, tokenCount) => {
        const total = Number(totalValue || 0);
        const count = Math.max(0, Number(tokenCount || 0));
        if (!count || !total) return [];

        const sign = total < 0 ? -1 : 1;
        const absTotal = Math.abs(total);
        const base = Math.floor(absTotal / count);
        let remainder = absTotal % count;
        const chunks = [];
        for (let i = 0; i < count; i++) {
            const bonus = remainder > 0 ? 1 : 0;
            if (remainder > 0) remainder -= 1;
            chunks.push(sign * (base + bonus));
        }
        return chunks;
    };

    const applyStep = (getter, sourceId = null) => {
        players.forEach((player, idx) => {
            const scoreEl = document.getElementById(`hstat-${idx}-score`);
            if (!scoreEl) return;

            const current = Number(scoreEl.textContent || 0);
            const delta = Number(getter(player) || 0);
            if (!delta) return;

            animateRollingValue(scoreEl, current, current + delta);

            if (sourceId) {
                const source = document.getElementById(sourceId);
                const target = document.getElementById(`score-chip-${idx}`);
                if (source && target) {
                    SFX.coin();
                    flyCoinToPlayer(source, target, `${delta > 0 ? '+' : ''}${delta}`, { borderColor: '#f2d39e', coinColor: '#7b3f2d' });
                }
            }
        });
    };

    let revealDelay = 240;
    const perTokenDelay = 280;
    const betweenTiersDelay = 260;

    // Camel bonus step (first thing to reveal before tier bonuses)
    setTimeout(() => {
        players.forEach((player, idx) => {
            const scoreEl = document.getElementById(`hstat-${idx}-score`);
            if (!scoreEl) return;
            const delta = player.camelBonus || 0;
            if (!delta) return;
            const current = Number(scoreEl.textContent || 0);
            animateRollingValue(scoreEl, current, current + delta);
            const source = document.getElementById(`camel-slot-${idx}`);
            const target = document.getElementById(`score-chip-${idx}`);
            if (source && target) {
                SFX.coin();
                flyCoinToPlayer(source, target, `+${delta}`, { borderColor: '#f2d39e', coinColor: '#7b3f2d' });
            }
        });
    }, revealDelay);
    revealDelay += 760;

    const tierPlan = [
        { tier: 'THREE', totalKey: 'bonus3x', sourceId: 'bonus-stack-THREE' },
        { tier: 'FOUR', totalKey: 'bonus4x', sourceId: 'bonus-stack-FOUR' },
        { tier: 'FIVE', totalKey: 'bonus5x', sourceId: 'bonus-stack-FIVE' }
    ];

    tierPlan.forEach(({ tier, totalKey, sourceId }) => {
        const perPlayerChunks = players.map((player) =>
            splitTotalIntoTokenSteps(player[totalKey] || 0, player.bonusCounts?.[tier] || 0)
        );
        const maxSteps = Math.max(0, ...perPlayerChunks.map((steps) => steps.length));

        for (let step = 0; step < maxSteps; step++) {
            const stepValues = perPlayerChunks.map((steps) => steps[step] || 0);
            setTimeout(() => {
                players.forEach((player, idx) => {
                    const scoreEl = document.getElementById(`hstat-${idx}-score`);
                    if (!scoreEl) return;

                    const delta = Number(stepValues[idx] || 0);
                    if (!delta) return;

                    const current = Number(scoreEl.textContent || 0);
                    animateRollingValue(scoreEl, current, current + delta);

                    const source = document.getElementById(sourceId);
                    const target = document.getElementById(`score-chip-${idx}`);
                    if (source && target) {
                        SFX.coin();
                        flyCoinToPlayer(source, target, `${delta > 0 ? '+' : ''}${delta}`, { borderColor: '#f2d39e', coinColor: '#7b3f2d' });
                    }
                });
            }, revealDelay);
            revealDelay += perTokenDelay;
        }

        revealDelay += betweenTiersDelay;
    });

    setTimeout(() => applyStep(p => (penaltyTarget && p.name === penaltyTarget) ? -(p.score + 1) : 0, null), revealDelay);
    revealDelay += 760;

    setTimeout(() => {
        players.forEach((player, idx) => {
            const scoreEl = document.getElementById(`hstat-${idx}-score`);
            if (scoreEl) scoreEl.textContent = `${player.score}`;
        });
        inPlaceScoreRevealAnimating = false;
        SFX.fanfare();
        renderGame();
    }, revealDelay);
}

function advanceInstructionStep() {
    SFX.click();
    const rules = getInstructionRules();
    if (instructionStep >= rules.length - 1) return;
    instructionStep++;
    renderInstructionStep();
}

function prevInstructionStep() {
    SFX.click();
    if (instructionStep <= 0) return;
    instructionStep--;
    renderInstructionStep();
}

function renderInstructionStep() {
    const rules = getInstructionRules();
    const rule = rules[instructionStep];
    const iconHtml = rule.icon === 'CAMEL_SVG' ? getResourceIconSvg('CAMEL', 'svg-sm') : rule.icon;
    const isFirst = instructionStep === 0;
    const isLast = instructionStep === rules.length - 1;

    const container = document.getElementById('instruction-step-container');
    if (!container) return;

    container.innerHTML = `
        <div class="rule-step" style="animation: ruleSlideIn 0.4s ease-out forwards;">
            <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
                <span class="rule-icon">${iconHtml}</span>

                ${rule.desc ? `<div class="rule-desc">${rule.desc}</div>` : ''}
            </div>
            ${rule.visual || ''}
        </div>
    `;

    const counter = document.getElementById('instruction-counter');
    if (counter) counter.textContent = (instructionStep + 1) + ' / ' + rules.length;

    const prevBtn = document.getElementById('instruction-prev-btn');
    const nextBtn = document.getElementById('instruction-next-btn');
    if (prevBtn) {
        prevBtn.style.opacity = isFirst ? '0.25' : '1';
        prevBtn.style.pointerEvents = isFirst ? 'none' : 'auto';
    }
    if (nextBtn) {
        nextBtn.style.opacity = isLast ? '0.25' : '1';
        nextBtn.style.pointerEvents = isLast ? 'none' : 'auto';
    }
}

async function startGameFromPreGame() {
    if (startTransitionInProgress) return;
    SFX.click();
    const startCuePromise = (async () => {
        await sleep(2250);
        playStartCueNoFade();
        scheduleGameplayBgmStart(1650);
    })();
    const menuFadePromise = (async () => {
        await sleep(2250);
        await fadeOutMenuBgm(700);
    })();

    startTransitionInProgress = true;

    try {
        if (pendingStartRequest) {
            await pendingStartRequest;
            pendingStartRequest = null;
        }

        await runLightSequence('out');
    } catch (err) {
        console.error('Pregame start transition error:', err);
    }

    await startCuePromise;
    await menuFadePromise;

    startTransitionInProgress = false;
    showingPreGame = false;
    forceOpeningDealAnimation = true;
    pendingUndimFromDark = true;
    renderGame();

    try {
        await runLightSequence('in');
    } catch (err) {
        console.error('Pregame light restore error:', err);
    }
}

function getSelectedPlayerName(playerNum) {
    if (playerNum === 1) {
        if (gameMode === 'bot-vs-bot') {
            const bot = botPlayers.find(b => (b.id || b) === selectedPlayer1);
            return bot ? bot.name : selectedPlayer1 || 'Player 1';
        }
        return 'Player 1';
    } else {
        if (gameMode === 'bot-vs-bot' || gameMode === 'human-vs-bot') {
            const bot = botPlayers.find(b => (b.id || b) === selectedPlayer2);
            return bot ? bot.name : selectedPlayer2 || 'Player 2';
        }
        return 'Player 2';
    }
}

        <div class="max-w-[96vw] mx-auto p-3 flex items-center justify-center">
            <button onclick="sendCommand('reset')" class="action-btn px-4 py-2 rounded-lg font-bold text-xs cursor-pointer">
                <i class="fa-solid fa-rotate-right mr-1"></i>RESET
            </button>
        </div>
    </div>
</div>
    `;
    
    // Start the score animation
    setTimeout(() => animateScoreReveal(players), 500);
}

function animateScoreReveal(players) {
    const container = document.getElementById('scoreReveal');
    if (!container) return;
    
    // Determine which bonus types should be shown
    const anyPlayerHasCamel = players.some(p => p.camelBonus > 0);
    const anyPlayerHas3x = players.some(p => (p.bonusCounts?.THREE || 0) > 0);
    const anyPlayerHas4x = players.some(p => (p.bonusCounts?.FOUR || 0) > 0);
    const anyPlayerHas5x = players.some(p => (p.bonusCounts?.FIVE || 0) > 0);
    
    // Create player sections side by side
    const playerSections = players.map((player, index) => {
        // Outer wrapper to contain both section and badge
        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'position: relative;';
        
        const section = document.createElement('div');
        section.className = 'p-4';
        section.style.cssText = 'display: flex; flex-direction: column;';
        
        const nameEl = document.createElement('h3');
        nameEl.className = 'text-lg sm:text-xl font-bold mb-3 text-center ancient-title';
        nameEl.style.color = '#654321';
        nameEl.textContent = player.name;
        section.appendChild(nameEl);
        
        // Wrapper for content
        const contentWrapper = document.createElement('div');
        contentWrapper.style.cssText = 'display: flex; flex-direction: column;';
        contentWrapper.className = 'content-wrapper';
        
        const scoreLines = document.createElement('div');
        scoreLines.className = 'space-y-2 text-sm sm:text-base';
        scoreLines.dataset.playerIndex = index;
        contentWrapper.appendChild(scoreLines);
        
        // Add total line at the bottom (initially showing 0)
        const totalLine = document.createElement('div');
        totalLine.className = 'total-line flex justify-between items-center pt-2 font-bold text-xl sm:text-2xl';
        totalLine.style.cssText = 'border-top: 3px solid #8b4513; margin-top: 12px;';
        totalLine.innerHTML = `
            <span class="ancient-title" style="color: #654321;">Total</span>
            <span class="total-number coin-icon" style="font-size: 1.5em;">0</span>
        `;
        contentWrapper.appendChild(totalLine);
        
        section.appendChild(contentWrapper);
        wrapper.appendChild(section);
        
        // Add to grid - with divider between
        if (index === 0) {
            container.appendChild(wrapper);
            // Add vertical divider
            const divider = document.createElement('div');
            divider.className = 'hidden lg:block';
            divider.style.cssText = 'background: #8b4513; opacity: 0.3;';
            container.appendChild(divider);
        } else {
            container.appendChild(wrapper);
        }
        
        return { wrapper, section, scoreLines, player, runningTotal: 0, totalLine };
    });
    
    let delay = 900;
    const baseDelayIncrement = 950;
    const bonusTierDelayIncrement = 1200;
    
    // Helper function to animate a number counting up
    const animateNumber = (element, targetValue, duration = 400) => {
        const startValue = 0;
        const startTime = performance.now();
        
        const updateNumber = (currentTime) => {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // Ease out function for smooth deceleration
            const easeOut = 1 - Math.pow(1 - progress, 3);
            const currentValue = Math.floor(startValue + (targetValue - startValue) * easeOut);
            
            element.textContent = (targetValue > 0 && currentValue > 0) ? `+${currentValue}` : currentValue;
            
            if (progress < 1) {
                requestAnimationFrame(updateNumber);
            } else {
                element.textContent = targetValue > 0 ? `+${targetValue}` : targetValue;
            }
        };
        
        requestAnimationFrame(updateNumber);
    };
    
    // Helper function to add a score line and update total
    const addScoreLine = (label, getValue, isBonus = false, delayIncrement = baseDelayIncrement) => {
        setTimeout(() => {
            SFX.coin();
            playerSections.forEach(({ scoreLines, player, totalLine }, idx) => {
                const value = getValue(player);
                const previousTotal = playerSections[idx].runningTotal;
                playerSections[idx].runningTotal += value;
                
                const line = document.createElement('div');
                line.className = 'score-line flex justify-between items-center';
                line.innerHTML = `
                    <span class="${isBonus ? '' : 'font-semibold'}" style="color: #654321;">${label}</span>
                    <span class="score-number font-bold" style="color: ${isBonus ? '#c87533' : '#8b4513'};">0</span>
                `;
                scoreLines.appendChild(line);
                
                // Animate the score number
                const scoreNumber = line.querySelector('.score-number');
                setTimeout(() => {
                    animateNumber(scoreNumber, value, 400);
                }, 100);
                
                // Update the total with animation
                const totalNumber = totalLine.querySelector('.total-number');
                setTimeout(() => {
                    // Animate total from previous value to new value
                    const totalStartValue = previousTotal;
                    const totalTargetValue = playerSections[idx].runningTotal;
                    const startTime = performance.now();
                    
                    const updateTotal = (currentTime) => {
                        const elapsed = currentTime - startTime;
                        const progress = Math.min(elapsed / 400, 1);
                        const easeOut = 1 - Math.pow(1 - progress, 3);
                        const currentValue = Math.floor(totalStartValue + (totalTargetValue - totalStartValue) * easeOut);
                        
                        totalNumber.textContent = currentValue;
                        
                        if (progress < 1) {
                            requestAnimationFrame(updateTotal);
                        } else {
                            totalNumber.textContent = totalTargetValue;
                        }
                    };
                    
                    requestAnimationFrame(updateTotal);
                }, 100);
            });
        }, delay);
        delay += delayIncrement;
    };
    
    // 1. Goods Score
    addScoreLine(`${getUiBadgeIconSvg('COINS', 'ui-badge-md', '#d4a85f', 'mr-2')}Goods`, p => p.rawScore || 0);
    
    // 2. Camel Bonus (always show)
    addScoreLine(`${getUiBadgeIconSvg('CAMEL', 'ui-badge-md', '#d4a85f', 'mr-2')}Camel`, p => p.camelBonus || 0, true);
    
    // 3. 3x Bonus (always show)
    addScoreLine(
        `${getUiBadgeIconSvg('BONUS3', 'ui-badge-md', '#d4a85f', 'mr-2')}3x Bonus`,
        p => p.bonus3x || 0,
        true,
        bonusTierDelayIncrement
    );
    
    // 4. 4x Bonus (always show)
    addScoreLine(
        `${getUiBadgeIconSvg('BONUS4', 'ui-badge-md', '#d4a85f', 'mr-2')}4x Bonus`,
        p => p.bonus4x || 0,
        true,
        bonusTierDelayIncrement
    );
    
    // 5. 5x Bonus (always show)
    addScoreLine(
        `${getUiBadgeIconSvg('BONUS5', 'ui-badge-md', '#d4a85f', 'mr-2')}5x Bonus`,
        p => p.bonus5x || 0,
        true,
        bonusTierDelayIncrement
    );
    
    // Add timeout penalty if applicable
    if (gameState.botTimeoutPlayer) {
        addScoreLine(
            '<i class="fa-solid fa-stopwatch coin-icon score-icon"></i>Penalty',
            p => p.name === gameState.botTimeoutPlayer ? -(p.score + 1) : 0,
            false
        );
    }
    
    // Wait a bit, then show winner badge
    delay += 500;
    setTimeout(() => {
        SFX.fanfare();
        // Check if game ended due to timeout
        if (gameState.botTimeoutPlayer) {
            playerSections.forEach(({ wrapper, player }) => {
                if (player.name !== gameState.botTimeoutPlayer) {
                    const badge = document.createElement('div');
                    badge.className = 'winner-badge text-center mt-4';
                    badge.innerHTML = '<span class="inline-block px-4 py-2 rounded-full font-bold text-base sm:text-lg ancient-title" style="background: #d4af37; color: #654321; border: 2px solid #8b4513; box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);"><i class="fa-solid fa-crown mr-2"></i>WINNER!</span>';
                    wrapper.appendChild(badge);
                }
            });
        } else {
            // Normal game ending - determine winner by score
            const maxScore = Math.max(...players.map(p => p.score));
            playerSections.forEach(({ wrapper, player }) => {
                if (player.score === maxScore) {
                    const badge = document.createElement('div');
                    badge.className = 'winner-badge text-center mt-4';
                    badge.innerHTML = '<span class="inline-block px-4 py-2 rounded-full font-bold text-base sm:text-lg ancient-title" style="background: #d4af37; color: #654321; border: 2px solid #8b4513; box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);"><i class="fa-solid fa-crown mr-2"></i>WINNER!</span>';
                    wrapper.appendChild(badge);
                }
            });
        }
    }, delay);
}

function createScoreLine(label, value, isBonus = false) {
    const line = document.createElement('div');
    line.className = 'score-line flex justify-between items-center';
    line.innerHTML = `
        <span class="${isBonus ? '' : 'font-semibold'}" style="color: #654321;">${label}</span>
        <span class="score-number font-bold" style="color: ${isBonus ? '#c87533' : '#8b4513'};">${isBonus && value > 0 ? '+' : ''}${value}</span>
    `;
    return line;
}


connectWebSocket();
</script>
</body>
